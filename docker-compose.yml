services:
  emotion:
    build: .
    image: emotion:latest
    container_name: emotion
    restart: unless-stopped
    ports:
      - "8096:8096"
    # Mount your media root here. The path inside the container (/data) is what
    # you'll pass to POST /admin/library/scan as "root".
    volumes:
      - ./data:/data:ro
    environment:
      APP_NAME: emotion
      APP_LOG_LEVEL: info
      STORAGE_TYPE: hdd

      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: emotion
      DB_USERNAME: emotion
      DB_PASSWORD: emotion_pwd
      DB_MAX_OPEN_CONNS: 30
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME_MINUTES: 30
      MEDIA_PROBE_WORKERS: 2
      MEDIA_PROBE_MAX_WORKERS: 4
      WATCH_INTERVAL_SECONDS: 180
      WATCH_MIN_INTERVAL_SECONDS: 60

      # API_KEY is the admin key used by Sakura_embyboss and other tools.
      API_KEY: ${API_KEY:-change-me-please}

      # TMDB metadata (optional). Leave empty to disable.
      # Get a free v3 key at https://www.themoviedb.org/settings/api
      TMDB_API_KEY: ""
      TMDB_LANGUAGE: zh-CN
      TMDB_AUTO_SCRAPE: "true"

      EMBY_VERSION: 4.8.10.0
      EMBY_ID: emotion
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: emotion
      POSTGRES_USER: emotion
      POSTGRES_PASSWORD: emotion_pwd
    command:
      - postgres
      - -c
      - max_connections=80
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  postgres-data:
